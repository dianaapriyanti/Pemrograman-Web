<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Pemilihan</h1>
    <p>Pemilihan</p>
    <script>
        // contoh if saja
        var nilai = 70;
        if (nilai >= 75) {
            console.log("Lulus");
        }
        
        // contoh nested if
        if(nilai >= 90){
            console.log("sangat memuaskan");
        }else if(nilai >= 75){
            console.log("memuaskan");
        }else{
            console.log("tidak memuaskan");
        }

        // contoh switch
        var warna = "MERAH";
        switch (warna) {
            case "MERAH":
                console.log("warna merah");
                break;
            case "BIRU":
                console.log("warna biru");
                break;
            case "HIJAU":
                console.log("warna kuning");
                break;
        
            default:
                break;
        }
    </script>
</body>
</html>
