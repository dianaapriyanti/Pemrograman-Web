<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            width: 320px;
        }

        .display {
            background: #2d2d44;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .previous {
            color: #888;
            font-size: 16px;
            min-height: 24px;
            word-break: break-all;
        }

        .current {
            color: #fff;
            font-size: 36px;
            font-weight: 600;
            word-break: break-all;
            min-height: 48px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 15px;
            padding: 20px;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        button:active {
            transform: translateY(0);
            filter: brightness(0.9);
        }

        .btn-number {
            background: #3d3d5c;
            color: #fff;
        }

        .btn-operator {
            background: #f59e0b;
            color: #fff;
        }

        .btn-clear {
            background: #ef4444;
            color: #fff;
            grid-column: span 2;
        }

        .btn-delete {
            background: #6b7280;
            color: #fff;
        }

        .btn-equals {
            background: #10b981;
            color: #fff;
            grid-column: span 2;
        }

        .btn-zero {
            grid-column: span 2;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous" id="previous"></div>
            <div class="current" id="current">0</div>
        </div>
        <div class="buttons">
            <button class="btn-clear" onclick="clearAll()">C</button>
            <button class="btn-delete" onclick="deleteLast()">⌫</button>
            <button class="btn-operator" onclick="chooseOperator('/')">÷</button>

            <button class="btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn-operator" onclick="chooseOperator('*')">×</button>

            <button class="btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn-operator" onclick="chooseOperator('-')">−</button>

            <button class="btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn-operator" onclick="chooseOperator('+')">+</button>

            <button class="btn-number btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn-number" onclick="appendNumber('.')">.</button>
            <button class="btn-equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentOperand = '0';
        let previousOperand = '';
        let currentOperator = null;
        let shouldResetScreen = false;

        const currentDisplay = document.getElementById('current');
        const previousDisplay = document.getElementById('previous');

        function updateDisplay() {
            currentDisplay.textContent = currentOperand;
            if (currentOperator != null) {
                previousDisplay.textContent = `${previousOperand} ${getOperatorSymbol(currentOperator)}`;
            } else {
                previousDisplay.textContent = previousOperand;
            }
        }

        function getOperatorSymbol(op) {
            const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
            return symbols[op] || op;
        }

        function appendNumber(number) {
            if (shouldResetScreen) {
                currentOperand = number === '.' ? '0.' : number;
                shouldResetScreen = false;
            } else {
                if (number === '.' && currentOperand.includes('.')) return;
                if (currentOperand === '0' && number !== '.') {
                    currentOperand = number;
                } else {
                    currentOperand += number;
                }
            }
            updateDisplay();
        }

        function chooseOperator(operator) {
            if (currentOperator !== null && !shouldResetScreen) {
                calculate();
            }
            currentOperator = operator;
            previousOperand = currentOperand;
            shouldResetScreen = true;
            updateDisplay();
        }

        function calculate() {
            if (currentOperator === null || shouldResetScreen) return;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            let result;
            switch (currentOperator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        result = 'Error';
                    } else {
                        result = prev / current;
                    }
                    break;
                default:
                    return;
            }

            if (result !== 'Error') {
                result = Math.round(result * 1000000000) / 1000000000;
            }

            currentOperand = result.toString();
            currentOperator = null;
            previousOperand = '';
            shouldResetScreen = true;
            updateDisplay();
        }

        function clearAll() {
            currentOperand = '0';
            previousOperand = '';
            currentOperator = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        function deleteLast() {
            if (currentOperand.length === 1 || (currentOperand.length === 2 && currentOperand.startsWith('-'))) {
                currentOperand = '0';
            } else {
                currentOperand = currentOperand.slice(0, -1);
            }
            updateDisplay();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '+') chooseOperator('+');
            if (e.key === '-') chooseOperator('-');
            if (e.key === '*') chooseOperator('*');
            if (e.key === '/') { e.preventDefault(); chooseOperator('/'); }
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
